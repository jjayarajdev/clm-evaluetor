<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <!-- OPTION A: Narrow gap, text at center-right like reference, dark navy readable everywhere -->
  <g transform="translate(32, 32)">
    <!-- Narrower gaps (14px) so text disruption is minimal -->
    <!-- Top-left — purple -->
    <path d="M 0,72 A 72,72 0 0,1 72,0 L 168,0 L 168,115 L 0,115 Z" fill="#7C3AED"/>
    <!-- Top-right — orange -->
    <path d="M 182,0 L 280,0 A 72,72 0 0,1 352,72 L 352,115 L 182,115 Z" fill="#FB923C"/>
    <!-- Bottom-left — orange -->
    <path d="M 0,129 L 168,129 L 168,250 L 72,250 A 72,72 0 0,1 0,178 Z" fill="#FB923C"/>
    <!-- Bottom-right — purple -->
    <path d="M 182,129 L 352,129 L 352,178 A 72,72 0 0,1 280,250 L 182,250 Z" fill="#7C3AED"/>
  </g>
  <!-- Text positioned center-right, straddling gap like the reference image -->
  <text x="250" y="175" font-family="Calibri, 'Segoe UI', sans-serif" font-size="33"
        font-weight="700" font-style="italic" fill="#1E1040" letter-spacing="-0.5"
        text-anchor="middle">Evaluetor</text>
</svg>
