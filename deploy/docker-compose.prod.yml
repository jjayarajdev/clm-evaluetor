version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-clm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Store
  chromadb:
    image: chromadb/chroma:latest
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clm}

      # ChromaDB
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}

      # App settings
      APP_NAME: "CLM Platform"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}

      # Optional: Langfuse observability
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: "true"
    volumes:
      - uploads_data:/app/data/uploads
      - chroma_backend_data:/app/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (nginx serving static files + reverse proxy)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  chroma_data:
  chroma_backend_data:
  uploads_data:
